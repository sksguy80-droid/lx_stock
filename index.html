<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>협력사 재고 조사 간편앱</title>

<style>
body { margin:0; font-family:-apple-system; background:#f4f6f8;}
.container { padding:20px; max-width:420px; margin:auto;}
.card { background:#fff; border-radius:16px; padding:20px; margin-bottom:15px;}
.select-wrap { display:flex; gap:10px;}
.select-card { flex:1; border:2px solid #ddd; border-radius:12px; padding:10px; text-align:center;}
.select-card.active { border-color:#007bff; background:#eef4ff;}
.input, select { width:100%; padding:12px; margin-top:10px; border-radius:10px; border:1px solid #ccc;}
.btn { width:100%; padding:14px; margin-top:15px; background:#111; color:#fff; border:none; border-radius:12px;}
.hidden { display:none; }
</style>

<script>
function selectRole(role){
  document.getElementById("partnerFields").classList.toggle("hidden", role==="lx");
}

function login(){
  alert("로그인 완료 (테스트)");
}
</script>

</head>

<body>
<div class="container">

<div class="card">
  <h3 style="text-align:center;">[협력사 재고 조사 간편앱]</h3>
  <p style="text-align:center;">모바일 전용 간단 재고 조사 기록/전송 기능 앱</p>

  <div class="select-wrap">
    <div class="select-card active" onclick="selectRole('partner')">
      협력사
    </div>
    <div class="select-card" onclick="selectRole('lx')">
      LX하우시스
    </div>
  </div>

  <div id="partnerFields">
    <select>
      <option>건일</option>
      <option>새한</option>
      <option>유진</option>
      <option>일진</option>
      <option>조일</option>
      <option>공간</option>
      <option>보승</option>
    </select>
  </div>

  <input class="input" placeholder="아이디">
  <input class="input" type="password" placeholder="비밀번호">

  <button class="btn" onclick="login()">로그인</button>
</div>

</div>
</body>
</html>
