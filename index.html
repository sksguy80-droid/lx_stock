<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>협력사 재고 조사 앱</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f4f6f8;
}

.container {
  padding: 20px;
}

.header {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  margin-bottom: 20px;
}

.header h1 {
  margin: 0;
  font-size: 20px;
}

.header p {
  margin-top: 8px;
  color: #666;
  font-size: 14px;
}

.card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}

.card-title {
  margin-bottom: 12px;
  font-weight: bold;
}

.select-wrap {
  display: flex;
  gap: 10px;
}

.select-card {
  flex: 1;
  border: 2px solid #ddd;
  border-radius: 16px;
  padding: 15px;
  text-align: center;
  cursor: pointer;
}

.select-card.active {
  border-color: #2b6cb0;
  background: #eef4ff;
}

.select-card img {
  width: 50px;
  margin-bottom: 10px;
}

.input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 14px;
}

.button {
  width: 100%;
  margin-top: 20px;
  padding: 16px;
  background: #0f172a;
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: bold;
}

.footer {
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  font-size: 13px;
  color: #666;
}
</style>

</head>

<body>

<div class="container">

  <!-- 상단 -->
  <div class="header">
    <h1>[협력사 재고 조사 간편앱]</h1>
    <p>모바일 전용 간단 재고 조사 기록/전송 기능 앱</p>
  </div>

  <!-- 로그인 -->
  <div class="card">
    <div class="card-title">로그인 구분</div>

    <div class="select-wrap">

      <!-- 협력사 -->
      <div class="select-card active" onclick="selectType(this)">
        <img src="https://cdn.jsdelivr.net/npm/@tabler/icons/icons/building-factory-2.svg">
        <div>협력사</div>
      </div>

      <!-- LX -->
      <div class="select-card" onclick="selectType(this)">
        <img src="https://raw.githubusercontent.com/sksguy80-droid/lx_stock/main/IMG_1377.jpeg">
        <div>LX하우시스</div>
      </div>

    </div>

    <input class="input" placeholder="협력사명 (예: ABC협력사)">
    <input class="input" placeholder="조사자 ID (예: user01)">
    <input class="input" type="password" placeholder="비밀번호 (테스트용)">

    <button class="button">로그인</button>
  </div>

  <!-- 옵션 -->
  <div class="footer">
    <b>옵션 미리 보기</b><br><br>
    로그인 후 우측 상단 설정에서 담당자 메일, 협력사 정보 등을 입력 가능
  </div>

</div>

<script>
function selectType(el) {
  document.querySelectorAll('.select-card').forEach(e => {
    e.classList.remove('active');
  });
  el.classList.add('active');
}
</script>

</body>
</html>
